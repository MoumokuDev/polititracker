<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}TruthTracker{% endblock %}</title>
<style>
  :root { --ink: #1a1a1a; --muted: #5a5f66; --line: #d9dce1; --accent: #1f4e79;
          --bg: #fafbfc; --card: #ffffff; --warn-bg: #fff8e6; --warn-line: #d9b44a; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.55 Georgia, "Times New Roman", serif;
         color: var(--ink); background: var(--bg); }
  nav { border-bottom: 1px solid var(--line); background: var(--card); }
  nav .inner { max-width: 62rem; margin: 0 auto; padding: .7rem 1rem;
               display: flex; gap: 1.4rem; align-items: baseline; }
  nav .brand { font-weight: bold; font-size: 1.05rem; color: var(--ink);
               text-decoration: none; }
  nav a { color: var(--accent); text-decoration: none; font-size: .95rem; }
  nav a:hover { text-decoration: underline; }
  main { max-width: 62rem; margin: 0 auto; padding: 1.4rem 1rem 3rem; }
  h1 { font-size: 1.45rem; margin: .4rem 0 .2rem; }
  h2 { font-size: 1.05rem; margin: 2rem 0 .6rem; letter-spacing: .04em;
       text-transform: uppercase; color: var(--muted); font-weight: 600; }
  h2:first-of-type { margin-top: 1rem; }
  .subtitle { color: var(--muted); font-size: .95rem; margin: 0 0 1rem; }
  .coverage { font-size: .85rem; color: var(--muted); border-left: 3px solid var(--line);
              padding: .4rem .8rem; margin: 1.2rem 0; }
  .badge { display: inline-block; font-size: .75rem; padding: .1rem .5rem;
           border: 1px solid var(--line); border-radius: 999px; margin-right: .4rem;
           background: var(--bg); color: var(--muted); font-family: system-ui, sans-serif; }
  .badge.ext { border-color: var(--warn-line); background: var(--warn-bg); }
  footer { max-width: 62rem; margin: 0 auto; padding: 1rem 1rem 2rem;
           font-size: .8rem; color: var(--muted); border-top: 1px solid var(--line); }
  a { color: var(--accent); }
  {% block style %}{% endblock %}
</style>
</head>
<body>
<nav><div class="inner">
  <a class="brand" href="/">TruthTracker</a>
  <a href="/">Directory</a>
  <a href="/search">Claim search</a>
  <a href="/coverage">Coverage</a>
  <a href="/login" style="margin-left: auto; color: var(--muted); font-size: .85rem">Editor</a>
</div></nav>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  Every fact displayed links to its primary source. Portraits are official
  government photographs. This tool presents records; it does not draw conclusions.
</footer>
</body>
</html>
