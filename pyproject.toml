[project]
name = "truthtracker"
version = "0.1.0"
description = "Self-hostable accountability dashboards for US federal officials, built on verifiable primary sources."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0.35",
    "alembic>=1.13",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3.6",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "apscheduler>=3.10,<4",
    "jinja2>=3.1",
    "sentence-transformers>=3.0",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic autogenerated migrations keep their generated style
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.extend-per-file-ignores]
# B008: FastAPI's Depends(...) in defaults is the framework's intended idiom.
"src/truthtracker/api/*" = ["B008"]
