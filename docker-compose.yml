services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polititracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-polititracker}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - tt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn polititracker.api.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-polititracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-polititracker}
      PORTRAITS_DIR: /data/portraits
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - tt_hfcache:/root/.cache/huggingface
      - tt_portraits:/data/portraits

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "polititracker.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-polititracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-polititracker}
      PORTRAITS_DIR: /data/portraits
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - tt_hfcache:/root/.cache/huggingface
      - tt_portraits:/data/portraits

volumes:
  tt_pgdata:
  tt_hfcache:
  tt_portraits:
